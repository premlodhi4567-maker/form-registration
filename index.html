<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Registration Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f0f2f5; line-height: 1.6; background-image: url('https://images.unsplash.com/photo-1519225423996-6d5e8d5f8d3a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2000&q=80'); background-size: cover; background-position: center; background-attachment: fixed; }
        h1 { text-align: center; color: #1a73e8; font-size: 24px; }
        form { max-width: 900px; margin: auto; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); backdrop-filter: blur(5px); }
        fieldset { border: 1px solid #e0e0e0; margin-bottom: 25px; padding: 20px; border-radius: 8px; }
        legend { font-weight: bold; color: #1a73e8; padding: 0 10px; }
        .boy-details { background-color: #e3f2fd; }
        .girl-details { background-color: #f3e5f5; }
        .marriage-details { background-color: #e8f5e8; }
        .witness-details { background-color: #fff3e0; }
        label { font-weight: 600; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        input[type="submit"] { background-color: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        input[readonly] { background-color: #e9ecef; }
        .timestamp-section input { background-color: #d4edda; font-weight: bold; text-align: center; width: 220px; margin: 0 auto; display: block; }
        #status-message { text-align: center; margin-top: 20px; padding: 15px; border-radius: 5px; display: none; font-weight: bold; }
        @media (max-width: 768px) { .row { flex-direction: column; gap: 5px; } }
    </style>
</head>
<body>

<h1>Marriage Registration Form</h1>

<div class="timestamp-section">
    <input type="text" id="timestamp" readonly>
</div>

<form id="marriageForm">
    <div class="address-selection" style="padding:15px; background:#fff; border-radius:8px; margin-bottom:15px; border:1px solid #ddd;">
        <label>ADV Name:</label>
        <input type="text" id="adv-name" required>
        <label>Primary Address Basis:</label>
        <select id="address-type" required>
            <option value="" disabled selected>Select Address Type</option>
            <option>Boy Address</option>
            <option>Girl Address</option>
            <option>Marriage Address</option>
        </select>
    </div>

    <div class="upload-selection" style="padding:15px; background:#fff3cd; border-radius:8px; margin-bottom:15px;">
        <label>Do you want to upload documents?</label>
        <select id="upload-toggle" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
    </div>

    <div class="sadar-selection" style="padding:15px; background:#e7f3ff; border-radius:8px; margin-bottom:15px;">
        <label>Please Select Your Sadar:</label>
        <select id="sadar-select" required>
            <option value="" disabled selected>Select Sadar</option>
            <option>Sadar First</option><option>Sadar Second</option><option>Sadar Third</option>
        </select>
    </div>

    <fieldset class="boy-details">
        <legend>Boy's Details</legend>
        <div class="upload-field">
            <label>Boy's Photo:</label>
            <div style="display: flex; gap: 10px;">
                <input type="file" id="boy-photo" accept="image/*" class="doc-upload">
                <button type="button" onclick="capturePhoto('boy-photo')" class="cam-btn">📷 Camera</button>
            </div>
            <img id="boy-photo-preview" style="max-width: 150px; margin-top:10px; display: none; border: 2px solid #fff;">
        </div>
        <div class="row">
            <div class="col"><label>Boy Name (EN):</label><input type="text" id="boy-name-en" required></div>
            <div class="col"><label>Boy Name (HI):</label><input type="text" id="boy-name-hi" required></div>
        </div>
        <div class="row">
            <div class="col"><label>Father Name (EN):</label><input type="text" id="boy-father-en" required></div>
            <div class="col"><label>Father Name (HI):</label><input type="text" id="boy-father-hi" required></div>
        </div>
        <div class="row">
            <div class="col"><label>Boy DOB:</label><input type="date" id="boy-dob" required></div>
            <div class="col"><label>Age:</label><input type="text" id="boy-age" readonly></div>
        </div>
        <label>Religion:</label>
        <select id="boy-religion" required>
            <option value="">Select Religion</option>
            <option>हिन्दू धर्म (Hinduism)</option>
            <option>इस्लाम धर्म (Islam)</option>
        </select>
        <div class="row">
            <div class="col"><label>Address (EN):</label><input type="text" id="boy-address-en" required placeholder="No commas allowed"></div>
            <div class="col"><label>Pincode:</label><input type="text" id="boy-pincode" maxlength="6" required></div>
        </div>
    </fieldset>

    <fieldset class="witness-details">
        <legend>Witness 1 Details</legend>
        <label>Relationship:</label>
        <select id="witness1-relationship" required>
            <option value="">Select Relationship</option>
            <option value="Mother">Mother/Father</option>
            <option value="Other">Other</option>
        </select>
        <div class="row">
            <div class="col"><label>Name (EN):</label><input type="text" id="witness1-name-en" required></div>
            <div class="col"><label>Mobile:</label><input type="tel" id="witness1-mobile" maxlength="10" required></div>
        </div>
    </fieldset>

    <div style="text-align: center; padding: 20px;">
        <input type="submit" value="Submit Registration">
        <button type="button" onclick="testSubmit()" style="background-color: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-left: 10px;">Test Connection</button>
    </div>
</form>

<div id="status-message"></div>

<script>
    // --- GLOBAL FUNCTIONS (Accessible by HTML) ---

    function capturePhoto(inputId) {
        const input = document.getElementById(inputId);
        if (!navigator.mediaDevices) return alert("Camera not supported");

        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(blob => {
                    const file = new File([blob], "capture.jpg", { type: "image/jpeg" });
                    const container = new DataTransfer();
                    container.items.add(file);
                    input.files = container.files;
                    input.dispatchEvent(new Event('change')); // Trigger preview
                }, 'image/jpeg');
                
                stream.getTracks().forEach(t => t.stop());
            }, 1000);
        }).catch(err => alert("Camera error: " + err));
    }

    function testSubmit() {
        alert("System check: Buttons are linked! Checking form validation now...");
        const form = document.getElementById('marriageForm');
        if (form.checkValidity()) {
            form.dispatchEvent(new Event('submit'));
        } else {
            form.reportValidity();
        }
    }

    // --- DOM LOGIC ---
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('marriageForm');

        // 1. Auto-Uppercase & No Commas
        document.querySelectorAll('input[type="text"]').forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/,/g, '');
            });
        });

        // 2. Age Calculation
        document.getElementById('boy-dob').addEventListener('change', function() {
            const age = Math.floor((new Date() - new Date(this.value)) / 31557600000);
            document.getElementById('boy-age').value = age || 0;
        });

        // 3. Upload Toggle
        document.getElementById('upload-toggle').addEventListener('change', function() {
            const display = this.value === 'No' ? 'none' : 'block';
            document.querySelectorAll('.upload-field, .doc-upload, .cam-btn').forEach(el => {
                el.style.display = display;
                if (el.tagName === 'INPUT') el.required = (this.value === 'Yes');
            });
        });

        // 4. Set Initial Timestamp
        document.getElementById('timestamp').value = Date.now();

        // 5. Submit Handling
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('status-message');
            status.style.display = 'block';
            status.textContent = 'Processing Submission...';
            status.style.backgroundColor = '#fff3cd';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.timestamp = document.getElementById('timestamp').value;

            fetch('https://script.google.com/macros/s/AKfycbzrcsM_oCV-0A-Of37VaCfvE14wAl_3l4ulhN_KUz7xyyi8Yyy5rZ-s-AseNvvgc3Z57Q/exec', {
                method: 'POST',
                body: new URLSearchParams(data),
                mode: 'no-cors' // Use no-cors if you get redirect errors with Apps Script
            })
            .then(() => {
                status.textContent = 'Success! Data sent to Google Sheets.';
                status.style.backgroundColor = '#d4edda';
                status.style.color = '#155724';
                form.reset();
            })
            .catch(err => {
                status.textContent = 'Error: ' + err.message;
                status.style.backgroundColor = '#f8d7da';
            });
        });
    });
</script>
</body>
</html>
